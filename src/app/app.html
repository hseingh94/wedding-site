<div class="luxury-container">
  
  <div *ngIf="!isUnlocked" class="unveil-screen" (click)="unlock()">
    <canvas id="particleCanvas"></canvas>
    
    <div class="reveal-content">
      <div class="wax-seal">
        <div class="seal-texture"></div>
        <span class="initials">H & M</span>
      </div>
      <h2 class="title-names">Hussein & Maguy</h2>
      <p class="invite-text">THE CELEBRATION OF LOVE</p>
      <div class="pulse-hint">TAP TO ENTER</div>
    </div>
  </div>

  <div *ngIf="isUnlocked" class="content-page fade-in">
    <div class="golden-light-overlay"></div>

    <div class="text-overlay">
      <p class="header-top">SAVE THE DATE</p>
      <h1>Hussein & Maguy</h1>
      <p class="date-hero">01 . 09 . 2026</p>

      <div class="dress-code">
        <svg viewBox="0 0 24 24" class="suit-icon">
          <path d="M6,2L12,6L18,2L20,5L12,12L4,5L6,2M12,12L19,22H5L12,12Z" />
        </svg>
        <p>DRESS CODE: SUITS ONLY</p>
      </div>

      <div class="countdown-grid">
        <div class="box"><span class="num">{{countdown.days}}</span><span class="lab">Days</span></div>
        <div class="dot">:</div>
        <div class="box"><span class="num">{{countdown.hours}}</span><span class="lab">Hrs</span></div>
        <div class="dot">:</div>
        <div class="box"><span class="num">{{countdown.minutes}}</span><span class="lab">Min</span></div>
        <div class="dot">:</div>
        <div class="box"><span class="num">{{countdown.seconds}}</span><span class="lab">Sec</span></div>
      </div>

      <a href="https://maps.google.com" target="_blank" class="luxury-btn">AYIA NAPA • CYPRUS</a>
    </div>

    <div class="slideshow">
      <img [src]="'./' + slides[currentSlideIndex]" class="active-slide">
      <div class="overlay-vignette"></div>
    </div>
  </div>

</div>
